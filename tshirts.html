<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: "Times New Roman", serif;
      margin: 0;
      padding: 0;
    }

    .menu-button { position: fixed; top: 20px; right: 20px; z-index: 100; cursor: pointer; background: none; border: none; padding: 10px; }
    .bar { display: block; width: 30px; height: 3px; margin: 6px 0; background-color: white; transition: 0.4s; }
    .menu-panel { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background-color: #111; box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5); transition: 0.4s; z-index: 99; padding-top: 80px; }
    .menu-panel.open { right: 0; }
    .menu-panel a { display: block; color: white; text-decoration: none; font-size: 20px; padding: 15px 25px; border-bottom: 1px solid #222; }
    .open .bar:nth-child(1) { transform: rotate(-45deg) translate(-6px, 6px); }
    .open .bar:nth-child(2) { opacity: 0; }
    .open .bar:nth-child(3) { transform: rotate(45deg) translate(-6px, -6px); }
  </style>
</head>

<body>

  <button class="menu-button" onclick="toggleMenu(this)">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <div class="menu-panel" id="mobileMenu">
    <a href="info.html">HOME</a>
    <a href="bottomless.html">BOTTOMLESS BOULEVARD</a>
    <a href="god-devil.html">GOD, the DEVIL, and YOU</a>
    <a href="cranberryapple.html">CRANBERY APPLE</a>
    <a href="domestic.html">DOMESTIC ISSUES</a>
    <a href="pounds.html">POUNDS PER SQUARE INCH</a>
    <a href="tshirts.html">T SHIRTS</a>
  </div>

  <div style="display: flex; justify-content: center; align-items: center; height: 70vh;">
    <p style="font-size: 28px; font-weight: bold; color: white; letter-spacing: 2px;">COMING SOON</p>
  </div>

  <script>
    function toggleMenu(button) {
      button.classList.toggle('open');
      document.getElementById('mobileMenu').classList.toggle('open');
    }
  </script>

</body>

</html>
